services:
  mcp-server:
    image: ghcr.io/schmalvis/coinbase-mcp-server:latest
    container_name: coinbase-mcp
    # MCP over stdio requires an interactive TTY
    stdin_open: true
    tty: true

    ports:
      - "${WEB_PORT:-3002}:${WEB_PORT:-3002}"

    environment:
      CDP_API_KEY_NAME: ${CDP_API_KEY_NAME}
      CDP_API_KEY_PRIVATE_KEY: ${CDP_API_KEY_PRIVATE_KEY}
      NETWORK_ID: ${NETWORK_ID:-base-sepolia}
      WEB_PORT: ${WEB_PORT:-3002}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      MNEMONIC_PHRASE: ${MNEMONIC_PHRASE:-}

    volumes:
      # WALLET_DATA_PATH (stack.env) controls where wallet data is stored:
      #   unset / default → Docker-managed named volume  (automatic, no host setup needed)
      #   absolute path   → bind mount to that host path (transparent, easy to back up)
      #                     The directory must exist and be writable by UID 1000 (node user).
      #                     e.g. mkdir -p /opt/coinbase-mcp/data && chown 1000:1000 /opt/coinbase-mcp/data
      - ${WALLET_DATA_PATH:-wallet_data}:/app/data

    restart: unless-stopped

# Named volume — only used when WALLET_DATA_PATH is unset.
# `docker compose down` preserves it; `docker compose down -v` deletes it (IRREVERSIBLE).
volumes:
  wallet_data:
