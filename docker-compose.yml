services:
  mcp-server:
    image: ghcr.io/schmalvis/coinbase-mcp-server:latest

    # MCP over stdio requires an interactive TTY
    stdin_open: true
    tty: true

    ports:
      - "${WEB_PORT:-3002}:${WEB_PORT:-3002}"

    environment:
      CDP_API_KEY_NAME: ${CDP_API_KEY_NAME}
      CDP_API_KEY_PRIVATE_KEY: ${CDP_API_KEY_PRIVATE_KEY}
      NETWORK_ID: ${NETWORK_ID:-base-sepolia}
      WEB_PORT: ${WEB_PORT:-3002}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}

    volumes:
      # Named volume → wallet_data.json survives container recreation
      - wallet_data:/app/data

    restart: unless-stopped

# Docker manages the lifecycle of this named volume independently of the container.
# `docker compose down` will NOT delete it; use `docker compose down -v` if you
# intentionally want to wipe the wallet (IRREVERSIBLE if not backed up).
volumes:
  wallet_data:
