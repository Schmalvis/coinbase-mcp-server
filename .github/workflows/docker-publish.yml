name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"           # triggers on version tags like v1.0.0, v1.2.3
  workflow_dispatch:       # allows manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. malvis/coinbase-mcp-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write      # required to push to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically provided, no setup needed

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag "latest" on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # tag with the full git tag, e.g. v1.2.3
            type=semver,pattern={{version}}
            # tag with major.minor only, e.g. v1.2
            type=semver,pattern={{major}}.{{minor}}
            # tag with the short git SHA for traceability, e.g. sha-a1b2c3d
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
